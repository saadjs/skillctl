name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o dist/skillctl ./cmd/skillctl

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION_CLEAN=${VERSION#v}
          TAR_NAME="skillctl_${VERSION_CLEAN}_${GOOS}_${GOARCH}.tar.gz"
          tar -czf "$TAR_NAME" -C "$GITHUB_WORKSPACE/dist" skillctl -C "$GITHUB_WORKSPACE" LICENSE README.md
          shasum -a 256 "$TAR_NAME" | tee "$TAR_NAME.sha256"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
