name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o dist/skillctl ./cmd/skillctl

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION_CLEAN=${VERSION#v}
          TAR_NAME="skillctl_${VERSION_CLEAN}_${GOOS}_${GOARCH}.tar.gz"
          tar -czf "$TAR_NAME" -C "$GITHUB_WORKSPACE/dist" skillctl -C "$GITHUB_WORKSPACE" LICENSE README.md
          shasum -a 256 "$TAR_NAME" | tee "$TAR_NAME.sha256"

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.tar.gz,*.tar.gz.sha256"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
  tap:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: saadjs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION_CLEAN=${VERSION#v}
          python - <<'PY'
          import json, os, urllib.request

          version = os.environ["VERSION"]
          token = os.environ["GH_TOKEN"]
          api = f"https://api.github.com/repos/saadjs/agent-skills/releases/tags/{version}"
          req = urllib.request.Request(api, headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)
          assets = {a["name"]: a["browser_download_url"] for a in data["assets"]}

          def read_sha(name):
              url = assets[name]
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}", "Accept": "application/octet-stream"})
              with urllib.request.urlopen(req) as resp:
                  content = resp.read().decode("utf-8").strip()
              return content.split()[0]

          vclean = version.lstrip("v")
          linux = f"skillctl_{vclean}_linux_amd64.tar.gz.sha256"
          darwin_amd64 = f"skillctl_{vclean}_darwin_amd64.tar.gz.sha256"
          darwin_arm64 = f"skillctl_{vclean}_darwin_arm64.tar.gz.sha256"

          sha_linux = read_sha(linux)
          sha_darwin_amd64 = read_sha(darwin_amd64)
          sha_darwin_arm64 = read_sha(darwin_arm64)

          formula = f'''class Skillctl < Formula
            desc "Install and manage agent skills"
            homepage "https://github.com/saadjs/agent-skills"
            version "{vclean}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/saadjs/agent-skills/releases/download/v{vclean}/skillctl_{vclean}_darwin_arm64.tar.gz"
                sha256 "{sha_darwin_arm64}"
              else
                url "https://github.com/saadjs/agent-skills/releases/download/v{vclean}/skillctl_{vclean}_darwin_amd64.tar.gz"
                sha256 "{sha_darwin_amd64}"
              end
            end

            on_linux do
              url "https://github.com/saadjs/agent-skills/releases/download/v{vclean}/skillctl_{vclean}_linux_amd64.tar.gz"
              sha256 "{sha_linux}"
            end

            def install
              bin.install "skillctl"
            end

            test do
              assert_match "skillctl", shell_output("#{bin}/skillctl --help")
            end
          end
          '''
          os.makedirs("tap/Formula", exist_ok=True)
          with open("tap/Formula/skillctl.rb", "w", encoding="utf-8") as f:
              f.write(formula)
          PY
          cd tap
          git add Formula/skillctl.rb
          if git diff --cached --quiet; then
            echo "No formula changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update skillctl ${VERSION}"
          git push
